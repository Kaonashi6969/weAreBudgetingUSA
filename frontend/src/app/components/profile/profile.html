<div class="profile-container">
  <div class="profile-header">
    <a routerLink="/" class="back-link">
      <app-icon name="arrow_back" />
      <span>{{ ui.translation()['find_deals'] }}</span>
    </a>
    <h2>Profile Settings</h2>
  </div>

  <app-region-selector
    [regions]="regions()"
    [activeRegionId]="ui.activeRegion().id"
    [sectionLabel]="ui.translation()['deployment_zone']"
    [selectLabel]="ui.translation()['active_region_label']"
    (regionChanged)="changeRegion($event)"
  />

  <div class="profile-section">
    <h3>
      <app-icon name="person" />
      <span>Account Preferences</span>
    </h3>

    <div class="settings-card">
      <div class="setting-row">
        <label for="profile-email">Email Address</label>
        <input id="profile-email" type="text" [value]="ui.user()?.email" disabled />
      </div>

      <div class="setting-row">
        <span class="setting-label">Subscription Tier</span>
        <div class="tier-info">
          <div class="tier-label">
            <span class="tier-name" [class.pro]="ui.user()?.tier === 'pro'">
              {{ ui.user()?.tier?.toUpperCase() || 'FREE' }}
            </span>
            <span class="tier-status">
              {{ ui.user()?.tier === 'pro' ? 'Unlimited access enabled' : 'Basic features active' }}
            </span>
          </div>
          @if (ui.user()?.tier !== 'pro') {
            <button class="upgrade-btn">Upgrade to PRO</button>
          }
        </div>
      </div>
    </div>
  </div>
</div>
