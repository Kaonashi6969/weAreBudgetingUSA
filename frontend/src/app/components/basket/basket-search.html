<div class="search-section">
  <div class="input-section">
    <label for="items">{{ translations['shopping_list_label'] }}</label>
    <textarea
      id="items"
      [ngModel]="itemsInput"
      (ngModelChange)="onItemsInputChange($event)"
      rows="5"
      [placeholder]="translations['placeholder']"
    >
    </textarea>
    <div class="helper-text">
      {{ translations['helper_text'] || 'Enter items like: milk, eggs, bread...' }}
    </div>

    <div class="example-chips">
      <button class="chip" (click)="onExampleClick('Milk')">Milk</button>
      <button class="chip" (click)="onExampleClick('Eggs')">Eggs</button>
      <button class="chip" (click)="onExampleClick('Chicken')">Chicken</button>
      <button class="chip" (click)="onExampleClick('Bread')">Bread</button>
    </div>
  </div>

  <app-store-selector
    [stores]="stores"
    [selected]="selectedStores"
    [label]="translations['filter_sources']"
    (toggled)="onStoreToggled($event)"
  />

  <button (click)="onSearch()" [disabled]="isLoading || !itemsInput.trim()" class="search-btn">
    @if (isLoading) {
      <span class="spinner"></span>
    } @else {
      <app-icon name="search" />
    }
    <span>{{ isLoading ? translations['running_matchmaker'] : translations['find_deals'] }}</span>
  </button>
</div>
