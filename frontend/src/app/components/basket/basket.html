<div class="basket-container">
  <h2 class="centered">{{ ui.translation()['optimizer_title'] }}</h2>

  <app-toast-list />

  <app-basket-search
    [itemsInput]="itemsInput()"
    [stores]="stores()"
    [selectedStores]="selectedStores()"
    [isLoading]="isLoading()"
    [translations]="ui.translation()"
    (itemsInputChange)="itemsInput.set($event)"
    (storeToggled)="toggleStore($event)"
    (searchRequested)="calculate()"
  />

  @if (results().length > 0) {
    <app-basket-overview
      [listName]="listName()"
      [totalItemsCount]="totalItemsCount()"
      [resultsLength]="results().length"
      [totalPrice]="totalPrice()"
      [currencySymbol]="currencySymbol()"
      [missingItemsCount]="missingItemsCount()"
      [userTier]="ui.user()?.tier || 'free'"
      [isSaving]="isSaving()"
      [translations]="ui.translation()"
      (listNameChange)="listName.set($event)"
      (saveRequested)="saveBasketToList()"
    />
  }

  @if (!isLoading() && results().length > 0) {
    <div class="results-grid">
      @for (item of results(); track item.userInput) {
        <app-product-result-card
          [item]="item"
          [selectedItems]="selectedItems()"
          [currencySymbol]="currencySymbol()"
          [noMatchText]="ui.translation()['could_not_find_item']"
          [selectedText]="ui.translation()['selected']"
          [selectThisText]="ui.translation()['select_this']"
          [initialDisplayLimit]="3"
          (matchSelected)="selectMatch($event.userInput, $event.match)"
          (quantityChanged)="updateQuantity($event.userInput, $event.matchId, $event.delta)"
        />
      }
    </div>
  }
</div>
