<div class="region-section-container">
  <h3>
    <app-icon name="public" />
    <span>{{ sectionLabel }}</span>
  </h3>

  <div class="region-grid">
    @for (r of regions; track r.id) {
      <button
        class="region-card"
        [class.active]="activeRegionId === r.id"
        (click)="regionChanged.emit(r.id)"
      >
        <div class="region-info">
          <span class="region-name">{{ r.name }}</span>
          <span class="region-currency">{{ r.currency.code }} ({{ r.currency.symbol }})</span>
        </div>
        @if (activeRegionId === r.id) {
          <div class="active-indicator">
            <app-icon name="check_circle" />
          </div>
        }
      </button>
    }
  </div>
</div>
