<div class="basket-summary">
  <div class="summary-card">
    <div class="summary-header">
      <div class="list-title-input">
        <app-icon name="edit" />
        <input
          type="text"
          [ngModel]="listName"
          (ngModelChange)="onTitleChange($event)"
          [placeholder]="translations['list_name_placeholder'] || 'Name your grocery list...'"
          class="list-name-control"
        />
      </div>
    </div>

    @if (userTier === 'pro') {
      <div class="pro-actions">
        <button (click)="onSave()" [disabled]="totalItemsCount === 0 || isSaving" class="save-btn">
          @if (isSaving) {
            <span class="spinner-small"></span>
          } @else {
            <app-icon name="cloud_upload" />
          }
          {{
            isSaving
              ? translations['saving_list']
              : translations['save_grocery_list'] || 'Save Grocery List'
          }}
        </button>
      </div>
    } @else {
      <app-upgrade-banner
        [title]="translations['get_pro_title']"
        [description]="translations['get_pro_desc']"
        [ctaLabel]="translations['upgrade_now']"
      />
    }
  </div>
</div>
